<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="display"></div>
    <div class="row">
      <button class="btn clear specialOp" data-action="clear">ac</button>
      <button class="btn specialOp" data-action="squareRoot">√x</button>
      <button class="btn specialOp" data-action="percentage">%</button>
      <button class="btn operator boldText" data-action="divide">÷</button>
    </div>
    <div class="row">
      <button class="btn boldText" data-number="7">7</button>
      <button class="btn boldText" data-number="8">8</button>
      <button class="btn boldText" data-number="9">9</button>
      <button class="btn boldText operator" data-action="multiply">×</button>
    </div>
    <div class="row">
      <button class="btn boldText" data-number="4">4</button>
      <button class="btn boldText" data-number="5">5</button>
      <button class="btn boldText" data-number="6">6</button>
      <button class="btn boldText operator" data-action="subtract">-</button>
    </div>
    <div class="row">
      <button class="btn boldText" data-number="1">1</button>
      <button class="btn boldText" data-number="2">2</button>
      <button class="btn boldText" data-number="3">3</button>
      <button class="btn boldText operator" data-action="add">+</button>
    </div>
    <div class="row">
      <button class="btn boldText" data-number="0">0</button>
      <button class="btn specialOp" data-action="decimal">.</button>
      <button class="btn specialOp" data-action="toggle">+/-</button>
      <button class="btn boldText operator" data-action="calculate">=</button>
    </div>
  </div>
  
  <script src="./script.js"></script>
</body>
</html>
