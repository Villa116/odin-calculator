<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="display"></div>
    <div class="row">
      <button class="btn clear specialOp">ac</button>
      <button class="btn specialOp">√x</button>
      <button class="btn specialOp">%</button>
      <button class="btn operator boldText">÷</button>
    </div>
    <div class="row">
      <button class="btn boldText">7</button>
      <button class="btn boldText">8</button>
      <button class="btn boldText">9</button>
      <button class="btn boldText operator">×</button>
    </div>
    <div class="row">
      <button class="btn boldText">4</button>
      <button class="btn boldText">5</button>
      <button class="btn boldText">6</button>
      <button class="btn boldText operator">-</button>
    </div>
    <div class="row">
      <button class="btn boldText">1</button>
      <button class="btn boldText">2</button>
      <button class="btn boldText">3</button>
      <button class="btn boldText operator">+</button>
    </div>
    <div class="row">
      <button class="btn boldText">0</button>
      <button class="btn specialOp">.</button>
      <button class="btn specialOp">+/-</button>
      <button class="btn boldText operator">=</button>
    </div>
  </div>
  
</body>
</html>
